services:
  newsnow:
    image: ghcr.io/ourongxing/newsnow:latest
    container_name: newsnow
    ports:
      - '4444:4444'
    volumes:
      - newsnow_data:/usr/app/.data
    environment:
      - HOST=0.0.0.0
      - PORT=4444
      - NODE_ENV=production
      - G_CLIENT_ID=
      - G_CLIENT_SECRET=
      - JWT_SECRET=
      - INIT_TABLE=true
      - ENABLE_CACHE=true
      - PRODUCTHUNT_API_TOKEN=
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEEPSEEK_API_KEY=
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: newsnow-ollama
    volumes:
      - ollama_data:/root/.ollama
    # GPU 支持 (如需 GPU 加速请取消注释)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  newsnow_data:
    name: newsnow_data
  ollama_data:
